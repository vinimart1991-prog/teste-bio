    :root {

    .page {
      width: min(1100px, calc(100% - 32px));

      padding: 32px 0 96px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(13, 92, 99, 0.96), rgba(8, 41, 50, 0.96));

      border-radius: 28px;
      padding: 32px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 1rem;
      line-height: 1.6;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(216, 207, 196, 0.9);
      border-radius: 22px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: 0 10px 24px rgba(42, 34, 28, 0.08);
      position: sticky;
      top: 12px;
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .reset-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .reset-btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .section-title {
      margin: 28px 0 14px;
      font-size: 1.25rem;
      color: var(--accent);
    }

    .quiz-grid {
      display: grid;
      gap: 18px;
    }

    .question-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 24px rgba(42, 34, 28, 0.07);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: #efe6da;
      color: #5b4f43;
    }

    .badge.dissertativa {
      background: #efe5fb;
      color: #5e3a8c;
    }

    .question-card h3 {
      margin: 0 0 16px;
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      border-radius: 16px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .option-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.correct {
      background: var(--right-soft);
      border-color: var(--right);
      color: #175133;
      font-weight: 700;
    }

    .option-btn.wrong {
      background: var(--wrong-soft);
      border-color: var(--wrong);
      color: #7f1e1b;
      font-weight: 700;
    }

    .feedback {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .feedback.correct {
      color: var(--right);
    }

    .feedback.wrong {
      color: var(--wrong);
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 20px, 1100px);
        padding-top: 18px;
      }

      .hero,
      .question-card {
        padding: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .reset-btn {
        width: 100%;
      }
    }
  </style>
</head>

            prompt: "32) Convertida da dissertativa: como mutações pontuais silenciosas, de sentido trocado e sem sentido podem afetar uma proteína?",
            options: [
              "Silenciosa: não altera o aminoácido; sentido trocado: troca um aminoácido por outro; sem sentido: gera códon de parada precoce, podendo truncar a proteína.",
              "Silenciosa: sempre destrói a proteína; sentido trocado: não altera nada; sem sentido: aumenta o tamanho da proteína.",
              "Silenciosa: troca DNA por RNA; sentido trocado: causa duplicação cromossômica; sem sentido: gera splicing alternativo.",
              "Todas produzem exatamente o mesmo efeito funcional.",
              "Apenas mutações silenciosas podem afetar proteínas."
            ],
            correctIndex: 0
          }
        ]
      }
    ];

    const flatQuestions = sections.flatMap(section => section.questions);
    const state = flatQuestions.map(() => ({ solved: false, guessedWrong: new Set() }));

    const quizRoot = document.getElementById("quizRoot");
    const scoreEl = document.getElementById("score");
    const progressEl = document.getElementById("progress");
    const totalEl = document.getElementById("total");
    const resetBtn = document.getElementById("resetBtn");

    function updateStats() {
      const solvedCount = state.filter(item => item.solved).length;
      scoreEl.textContent = `Acertos: ${solvedCount}`;
      progressEl.textContent = `Respondidas: ${solvedCount}`;
      totalEl.textContent = `Total: ${flatQuestions.length}`;
    }

    function answerQuestion(globalIndex, optionIndex) {
      const question = flatQuestions[globalIndex];
      const questionState = state[globalIndex];

      if (questionState.solved) {
        return;
      }

      if (optionIndex === question.correctIndex) {
        questionState.solved = true;
      } else {
        questionState.guessedWrong.add(optionIndex);
      }

      renderQuiz();
      updateStats();
    }

    function resetQuiz() {
      for (const item of state) {
        item.solved = false;
        item.guessedWrong = new Set();
      }
      renderQuiz();
      updateStats();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuiz() {
      quizRoot.innerHTML = "";
      let globalIndex = 0;

      sections.forEach(section => {
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = section.title;
        quizRoot.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "quiz-grid";

        section.questions.forEach((question, localIndex) => {
          const questionIndex = globalIndex;
          const questionState = state[questionIndex];
          const card = document.createElement("article");
          card.className = "question-card";

          const meta = document.createElement("div");
          meta.className = "meta";

          const number = document.createElement("span");
          number.className = "badge";
          number.textContent = `Questão ${globalIndex + 1}`;
          meta.appendChild(number);

          const type = document.createElement("span");
          type.className = `badge ${question.type}`;
          type.textContent = question.type === "dissertativa" ? "Convertida da dissertativa" : "Múltipla escolha";
          meta.appendChild(type);

          const source = document.createElement("span");
          source.className = "badge";
          source.textContent = `Bloco ${localIndex + 1}`;
          meta.appendChild(source);

          const titleEl = document.createElement("h3");
          titleEl.textContent = question.prompt;

          const optionsEl = document.createElement("div");
          optionsEl.className = "options";

          question.options.forEach((option, optionIndex) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "option-btn";
            button.textContent = option;

            if (questionState.solved && optionIndex === question.correctIndex) {
              button.classList.add("correct");
              button.disabled = true;
            } else if (questionState.guessedWrong.has(optionIndex)) {
              button.classList.add("wrong");
            }

            if (questionState.solved) {
              button.disabled = true;
            } else {
              button.addEventListener("click", () => answerQuestion(questionIndex, optionIndex));
            }

            optionsEl.appendChild(button);
          });

          const feedback = document.createElement("div");
          feedback.className = "feedback";

          if (questionState.solved) {
            feedback.classList.add("correct");
            feedback.textContent = "Resposta correta marcada em verde.";
          } else if (questionState.guessedWrong.size > 0) {
            feedback.classList.add("wrong");
            feedback.textContent = "Alternativa incorreta marcada em vermelho. Você ainda pode tentar novamente.";
          } else {
            feedback.textContent = "Selecione uma alternativa.";
          }

          card.append(meta, titleEl, optionsEl, feedback);
          grid.appendChild(card);
          globalIndex += 1;
        });

        quizRoot.appendChild(grid);
      });
    }

    resetBtn.addEventListener("click", resetQuiz);

    renderQuiz();
    updateStats();
  </script>
</body>
</html>

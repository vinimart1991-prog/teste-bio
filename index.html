      display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;

    .pill { background: var(--accent-soft); color: var(--accent); border-radius: 999px; padding: 10px 14px; font-weight: 700; font-size: .95rem; }
    .reset-btn { border: 0; border-radius: 14px; padding: 12px 18px; background: var(--ink); color: #fff; cursor: pointer; font-weight: 700; }
    .section-title { margin: 28px 0 14px; font-size: 1.25rem; color: var(--accent); }
    .quiz-grid { display: grid; gap: 18px; }
    .question-card { background: var(--paper); border: 1px solid var(--border); border-radius: 22px; padding: 22px; box-shadow: 0 10px 24px rgba(42,34,28,.07); }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .badge { border-radius: 999px; padding: 6px 10px; font-size: .78rem; font-weight: 700; letter-spacing: .02em; background: #efe6da; color: #5b4f43; }
    .badge.dissertativa { background: #efe5fb; color: #5e3a8c; }
    .question-card h3 { margin: 0 0 16px; font-size: 1.05rem; line-height: 1.55; }
    .question-card img { width: 100%; max-width: 520px; display: block; margin: 10px 0 16px; border-radius: 16px; border: 1px solid var(--border); background: #fff; }
    .caption { margin: 0 0 16px; font-size: .9rem; color: var(--muted); }
    .options { display: grid; gap: 10px; }
    .option-btn { width: 100%; border: 1px solid var(--border); background: #fff; color: var(--ink); border-radius: 16px; padding: 14px 16px; text-align: left; cursor: pointer; font-size: .98rem; line-height: 1.45; }

    .feedback.correct { color: var(--right); }
    .feedback.wrong { color: var(--wrong); }

    @media (max-width: 720px) {
      .page { width: min(100% - 20px, 1100px); padding-top: 18px; }
      .hero, .question-card { padding: 18px; }
      .toolbar { grid-template-columns: 1fr; }
      .reset-btn { width: 100%; }

            ],
            correctIndex: 3,
            hint: "Pol III é a principal enzima de síntese.",
            explanation: "A Polimerase III é a enzima replicativa principal em E. coli. Memorização: Pol III = principal."
          },
          {
            type: "objetiva",
            prompt: "25) Qual é a principal função da adição da cauda poli-A ao mRNA eucariótico?",
            options: [

              "Remover íntrons e ligar éxons para formar o mRNA maduro.",
              "Proteger o mRNA da degradação e auxiliar na exportação nuclear e no início da tradução.",
              "Sinalizar o término da transcrição e liberar a RNA polimerase.",
              "Atuar como sítio de ligação para iniciar a transcrição."
            ],
            correctIndex: 2,
            hint: "Poli-A protege e ajuda no transporte.",
            explanation: "A cauda poli-A aumenta estabilidade e ajuda na exportação e tradução. Memorização: A de Ajuda."
          },
          {
            type: "objetiva",
            prompt: "26) Na tradução, qual é o papel essencial do sítio P (peptidil) do ribossomo?",
            options: [
              "Receber o tRNA com o próximo aminoácido.",
              "Permitir a saída do tRNA descarregado.",
              "Catalisar a ligação fosfodiéster entre nucleotídeos do mRNA.",
              "Manter o tRNA com a cadeia polipeptídica em crescimento, facilitando a ligação peptídica.",
              "Reconhecer o códon de iniciação e recrutar a subunidade menor."
            ],
            correctIndex: 3,
            hint: "Sítio P = peptidil.",
            explanation: "O sítio P mantém o tRNA com a cadeia em crescimento. Memorização: P = Peptídeo."
          },
          {
            type: "objetiva",
            prompt: "27) Qual afirmação descreve corretamente uma diferença estrutural crucial entre DNA e RNA?",
            options: [
              "O DNA é sempre de fita simples e o RNA sempre de fita dupla.",
              "A uracila está no DNA e a timina no RNA.",
              "O DNA contém desoxirribose e timina, sendo mais estável; o RNA possui ribose e uracila, sendo mais versátil.",
              "O DNA fica exclusivamente no núcleo, enquanto o RNA fica apenas no citoplasma.",
              "O DNA é traduzido diretamente em proteínas."
            ],
            correctIndex: 2,
            hint: "Diferença está no açúcar e na base T/U.",
            explanation: "DNA: desoxirribose e timina; RNA: ribose e uracila. Memorização: DNA tem 'de' (desoxi)."
          },
          {
            type: "dissertativa",
            prompt: "28) Convertida da dissertativa: como a presença ou ausência de lactose e glicose afeta a expressão do operon lac?",
            options: [
              "Sem lactose, o repressor lac bloqueia o operon; com lactose, ele é inativado. Baixa glicose aumenta AMPc e ativa CAP.",
              "Com lactose, o repressor lac se liga mais fortemente ao operador e a glicose ativa CAP.",
              "A lactose ativa diretamente a RNA polimerase sem participação do repressor, e a glicose não interfere.",
              "Sem glicose, o operon lac é sempre desligado e não depende de lactose.",
              "CAP atua como enzima de replicação e não participa da regulação gênica."
            ],
            correctIndex: 0,
            hint: "Lactose remove o repressor; pouca glicose ativa CAP.",
            explanation: "Lactose inativa o repressor lac, e baixo nível de glicose aumenta AMPc, permitindo CAP ativar a transcrição. Memorização: Lac libera; CAP ativa."
          },
          {
            type: "dissertativa",
            prompt: "29) Convertida da dissertativa: o que é splicing alternativo e qual sua importância?",
            options: [
              "É a seleção variável de éxons de um mesmo pré-mRNA, gerando diferentes proteínas e aumentando a diversidade proteica.",
              "É a duplicação completa dos cromossomos antes da tradução.",
              "É a troca de timina por uracila diretamente no DNA.",
              "É um tipo de mutação que sempre causa perda total de função.",
              "É o processo de união de ribossomos para formar o nucléolo."
            ],
            correctIndex: 0,
            hint: "Um gene pode gerar várias proteínas.",
            explanation: "Splicing alternativo combina éxons de formas diferentes, aumentando a diversidade proteica. Memorização: alternativo = alternativas de éxons."
          },
          {
            type: "dissertativa",
            prompt: "30) Convertida da dissertativa: qual alternativa resume corretamente a função dos telômeros e da telomerase?",
            options: [
              "Telômeros protegem extremidades cromossômicas; telomerase repõe sequências, influenciando envelhecimento e câncer.",
              "Telômeros iniciam a tradução e telomerase produz ribossomos.",
              "Telômeros controlam glicose e telomerase remove mutações pontuais.",
              "Telômeros existem apenas em procariotos e telomerase inibe toda divisão celular.",
              "Telômeros são regiões centrais para segregação meiótica."
            ],
            correctIndex: 0,
            hint: "Telômero = tampão; telomerase repõe.",
            explanation: "Telômeros protegem as pontas e encurtam com divisões; telomerase alonga, relevante em envelhecimento e câncer. Memorização: telômero = tampinha."
          },
          {
            type: "dissertativa",
            prompt: "31) Convertida da dissertativa: compare replicação do DNA em procariotos e eucariotos.",
            options: [
              "Procariotos têm DNA circular com uma origem e menor complexidade; eucariotos têm múltiplas origens em cromossomos lineares e maior regulação.",
              "Eucariotos replicam DNA apenas no citoplasma, e procariotos apenas no núcleo.",
              "Procariotos usam ribossomos para replicação, e eucariotos usam lisossomos.",
              "Nos eucariotos não há síntese descontínua.",
              "São processos idênticos."
            ],
            correctIndex: 0,
            hint: "Procariotos: simples e circular. Eucariotos: múltiplas origens.",
            explanation: "Diferenças principais: número de origens, organização cromossômica e complexidade enzimática. Memorização: eucarionte = complexo."
          },
          {
            type: "dissertativa",
            prompt: "32) Convertida da dissertativa: como mutações pontuais silenciosas, de sentido trocado e sem sentido afetam proteínas?",
            options: [
              "Silenciosa não altera aminoácido; sentido trocado altera um aminoácido; sem sentido cria parada precoce.",
              "Silenciosa sempre destrói a proteína; sentido trocado não altera nada; sem sentido aumenta tamanho.",
              "Silenciosa troca DNA por RNA; sentido trocado causa duplicação cromossômica; sem sentido gera splicing alternativo.",
              "Todas produzem exatamente o mesmo efeito.",
              "Apenas mutações silenciosas podem afetar proteínas."
            ],
            correctIndex: 0,
            hint: "Silenciosa = mesmo aminoácido; sem sentido = stop.",
            explanation: "Silenciosa não muda aminoácido; missense troca um; nonsense gera parada precoce. Memorização: silent, miss, nonsense."
          }
        ]
      }
    ];

    const flatQuestions = sections.flatMap(section => section.questions);
    const state = flatQuestions.map(() => ({ solved: false, guessedWrong: new Set() }));

    const quizRoot = document.getElementById("quizRoot");
    const scoreEl = document.getElementById("score");
    const progressEl = document.getElementById("progress");
    const totalEl = document.getElementById("total");
    const resetBtn = document.getElementById("resetBtn");

    function updateStats() {
      const solvedCount = state.filter(item => item.solved).length;
      scoreEl.textContent = `Acertos: ${solvedCount}`;
      progressEl.textContent = `Respondidas: ${solvedCount}`;
      totalEl.textContent = `Total: ${flatQuestions.length}`;
    }

    function answerQuestion(globalIndex, optionIndex) {
      const question = flatQuestions[globalIndex];
      const questionState = state[globalIndex];

      if (!question || !questionState || questionState.solved) {
        return;
      }

      if (optionIndex === question.correctIndex) {
        questionState.solved = true;
      } else {
        questionState.guessedWrong.add(optionIndex);
      }

      renderQuiz();
      updateStats();
    }

    function resetQuiz() {
      for (const item of state) {
        item.solved = false;
        item.guessedWrong = new Set();
      }
      renderQuiz();
      updateStats();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuiz() {
      quizRoot.innerHTML = "";
      let globalIndex = 0;

      sections.forEach(section => {
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = section.title;
        quizRoot.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "quiz-grid";

        section.questions.forEach((question, localIndex) => {
          const questionIndex = globalIndex;
          const questionState = state[questionIndex];
          const card = document.createElement("article");
          card.className = "question-card";

          const meta = document.createElement("div");
          meta.className = "meta";

          const number = document.createElement("span");
          number.className = "badge";
          number.textContent = `Questão ${questionIndex + 1}`;
          meta.appendChild(number);

          const type = document.createElement("span");
          type.className = `badge ${question.type}`;
          type.textContent = question.type === "dissertativa" ? "Convertida da dissertativa" : "Múltipla escolha";
          meta.appendChild(type);

          const source = document.createElement("span");
          source.className = "badge";
          source.textContent = `Bloco ${localIndex + 1}`;
          meta.appendChild(source);

          const titleEl = document.createElement("h3");
          titleEl.textContent = question.prompt;

          card.append(meta, titleEl);

          if (question.image) {
            const image = document.createElement("img");
            image.src = question.image.src;
            image.alt = question.image.alt;
            card.appendChild(image);

            if (question.image.caption) {
              const caption = document.createElement("p");
              caption.className = "caption";
              caption.textContent = question.image.caption;
              card.appendChild(caption);
            }
          }

          const optionsEl = document.createElement("div");
          optionsEl.className = "options";

          question.options.forEach((option, optionIndex) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "option-btn";
            button.textContent = option;

            if (questionState.solved && optionIndex === question.correctIndex) {
              button.classList.add("correct");
              button.disabled = true;
            } else if (questionState.guessedWrong.has(optionIndex)) {
              button.classList.add("wrong");
            }

            if (questionState.solved) {
              button.disabled = true;
            } else {
              button.addEventListener("click", () => answerQuestion(questionIndex, optionIndex));
            }

            optionsEl.appendChild(button);
          });

          const feedback = document.createElement("div");
          feedback.className = "feedback";

          if (questionState.solved) {
            feedback.classList.add("correct");
            feedback.textContent = "Resposta correta marcada em verde.";
          } else if (questionState.guessedWrong.size > 0) {
            feedback.classList.add("wrong");
            feedback.textContent = "Alternativa incorreta marcada em vermelho. Você ainda pode tentar novamente.";
          } else {
            feedback.textContent = "Selecione uma alternativa.";
          }

          const hint = document.createElement("details");
          const hintSummary = document.createElement("summary");
          hintSummary.textContent = "Dica";
          const hintText = document.createElement("p");
          hintText.className = "tip";
          hintText.textContent = question.hint;
          hint.append(hintSummary, hintText);

          const explanation = document.createElement("details");
          const explanationSummary = document.createElement("summary");
          explanationSummary.textContent = "Explicação e memorização";
          const explanationText = document.createElement("p");
          explanationText.className = "tip";
          explanationText.textContent = question.explanation;
          explanation.append(explanationSummary, explanationText);

          card.append(optionsEl, feedback, hint, explanation);
          grid.appendChild(card);
          globalIndex += 1;
        });

        quizRoot.appendChild(grid);
      });
    }

    resetBtn.addEventListener("click", resetQuiz);

    renderQuiz();
    updateStats();
  </script>
</body>
</html>
